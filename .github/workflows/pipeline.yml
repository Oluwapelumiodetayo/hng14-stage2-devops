name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint API with flake8
        run: flake8 api/ --max-line-length=120 --exclude=api/tests/

      - name: Lint Worker with flake8
        run: flake8 worker/ --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint Frontend with eslint
        run: cd frontend && npx eslint . --ext .js --ignore-pattern node_modules/

      - name: Lint api/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint worker/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Lint frontend/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit=tests/*

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image for scanning
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker image for scanning
        run: docker build -t worker:${{ github.sha }} ./worker

      - name: Build Frontend image for scanning
        run: docker build -t frontend:${{ github.sha }} ./frontend

      - name: Scan API with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Worker with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment file
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for stack..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            COUNT=$(docker compose ps --status running -q | wc -l)
            echo "  running=$COUNT elapsed=${ELAPSED}s"
            if [ "$COUNT" -ge 4 ]; then
              echo "All services running."
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          docker compose ps

      - name: Run integration test
        run: bash integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$DEPLOY_USER@$DEPLOY_HOST" << 'REMOTE'
            set -e
            cd /opt/app
            git pull origin main

            for SERVICE in api worker frontend; do
              echo "=== Updating $SERVICE ==="
              docker compose build $SERVICE
              docker compose up -d --no-deps $SERVICE

              HEALTHY=false
              for i in $(seq 1 12); do
                CID=$(docker compose ps -q $SERVICE)
                HEALTH=$(docker inspect \
                  --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                  $CID 2>/dev/null || echo "none")
                echo "  health=$HEALTH attempt=$i"
                if [ "$HEALTH" = "healthy" ]; then
                  HEALTHY=true
                  break
                fi
                sleep 5
              done

              if [ "$HEALTHY" = "false" ]; then
                echo "ABORT: $SERVICE health check failed."
                exit 1
              fi
              echo "$SERVICE updated."
            done
            echo "=== Deploy complete ==="
          REMOTE

          rm -f /tmp/deploy_key
