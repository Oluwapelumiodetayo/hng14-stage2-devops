name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn redis pytest httpx flake8 coverage
          npm install -g eslint

      - name: Run ESLint
        run: eslint . || true

      - name: Run flake8
        run: flake8 api || true

      - name: Run tests
        run: PYTHONPATH=. pytest api/tests

      - name: Run coverage
        run: |
          coverage run -m pytest api/tests
          coverage report

      - name: Generate coverage XML
        run: coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build API image
        run: docker build -t hng14-api ./api

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hng14-api
          format: table
          exit-code: 0
