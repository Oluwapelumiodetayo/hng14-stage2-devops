name: HNG14 Stage 2 CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint
        run: |
          pip install flake8
          flake8 api worker

      - name: JS lint
        run: |
          npm install
          npx eslint frontend || true

      - name: Docker lint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: hng14-stage2-devops-api
          format: table
          severity: CRITICAL,HIGH

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Test API
        run: |
          sleep 10
          curl -X POST http://localhost:8000/jobs

      - name: Tear down
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Simulated rolling deploy
        run: |
          echo "Deploying new version..."
          docker compose up -d --build
